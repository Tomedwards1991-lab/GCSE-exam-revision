<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Command words</title>
  <desc id="desc">A diagram explaining state, describe, explain and compare command words.</desc>
  <rect width="960" height="320" fill="#f7f9fb"/>
  <text x="54" y="62" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#172033">Command word ladder</text>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="70" y="220" width="184" height="48" rx="8" fill="#e9f2ff" stroke="#cfe0ff" stroke-width="2"/>
    <text x="116" y="251" font-weight="700" fill="#172033">State</text>
    <text x="92" y="292" font-size="15" fill="#657086">Give the answer</text>
    <rect x="286" y="174" width="184" height="48" rx="8" fill="#f5fbf8" stroke="#b7ddd2" stroke-width="2"/>
    <text x="328" y="205" font-weight="700" fill="#172033">Describe</text>
    <text x="302" y="246" font-size="15" fill="#657086">Point + detail</text>
    <rect x="502" y="128" width="184" height="48" rx="8" fill="#fff9e8" stroke="#ead89d" stroke-width="2"/>
    <text x="552" y="159" font-weight="700" fill="#172033">Explain</text>
    <text x="522" y="200" font-size="15" fill="#657086">Point + because</text>
    <rect x="718" y="82" width="184" height="48" rx="8" fill="#f8f6ff" stroke="#d6cdf6" stroke-width="2"/>
    <text x="766" y="113" font-weight="700" fill="#172033">Compare</text>
    <text x="736" y="154" font-size="15" fill="#657086">Both sides + difference</text>
  </g>
  <path d="M254 220l32-18M470 174l32-18M686 128l32-18" stroke="#657086" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#657086"/>
    </marker>
  </defs>
</svg>
