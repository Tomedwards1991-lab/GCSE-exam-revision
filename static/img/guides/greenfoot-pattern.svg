<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Greenfoot question checklist</title>
  <desc id="desc">A diagram showing Greenfoot world, actors, movement, collision, counter and save name marks.</desc>
  <rect width="960" height="420" fill="#f7f9fb"/>
  <rect x="48" y="54" width="384" height="312" rx="8" fill="#ffffff" stroke="#dce3eb" stroke-width="3"/>
  <text x="74" y="94" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">World constructor</text>
  <g stroke="#dce3eb" stroke-width="2">
    <path d="M86 122v202M126 122v202M166 122v202M206 122v202M246 122v202M286 122v202M326 122v202M366 122v202"/>
    <path d="M86 122h320M86 162h320M86 202h320M86 242h320M86 282h320M86 322h320"/>
  </g>
  <circle cx="146" cy="182" r="18" fill="#2454a6"/>
  <circle cx="286" cy="262" r="18" fill="#2454a6"/>
  <rect x="226" y="142" width="34" height="34" rx="6" fill="#1d7a6f"/>
  <rect x="346" y="222" width="34" height="34" rx="6" fill="#1d7a6f"/>
  <text x="74" y="350" font-family="Arial, sans-serif" font-size="16" fill="#657086">Objects appear when the world opens</text>
  <rect x="500" y="54" width="376" height="312" rx="8" fill="#172033"/>
  <text x="528" y="94" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Actor act()</text>
  <text x="528" y="132" font-family="Menlo, Consolas, monospace" font-size="17" fill="#dff3ed">move(2);</text>
  <text x="528" y="162" font-family="Menlo, Consolas, monospace" font-size="17" fill="#dff3ed">turn(Greenfoot.getRandomNumber(...));</text>
  <text x="528" y="204" font-family="Menlo, Consolas, monospace" font-size="17" fill="#cfe0ff">if (Greenfoot.isKeyDown("left"))</text>
  <text x="548" y="232" font-family="Menlo, Consolas, monospace" font-size="17" fill="#cfe0ff">turn(-4);</text>
  <text x="528" y="274" font-family="Menlo, Consolas, monospace" font-size="17" fill="#ffffff">if (touching item) remove item;</text>
  <text x="528" y="304" font-family="Menlo, Consolas, monospace" font-size="17" fill="#ffffff">playSound(...); counter++;</text>
  <rect x="548" y="330" width="254" height="28" rx="4" fill="#2454a6"/>
  <text x="566" y="350" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Save as exact final name</text>
  <path d="M432 210h50" stroke="#657086" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#657086"/>
    </marker>
  </defs>
</svg>
