<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" role="img" aria-labelledby="title desc">
  <title id="title">Model answer builder</title>
  <desc id="desc">A diagram showing how question words become model answer lines and marks.</desc>
  <rect width="960" height="380" fill="#f7f9fb"/>
  <text x="54" y="58" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#172033">Build the model answer one mark at a time</text>
  <rect x="58" y="94" width="258" height="216" rx="8" fill="#ffffff" stroke="#dce3eb" stroke-width="3"/>
  <text x="82" y="132" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">Question source</text>
  <text x="82" y="168" font-family="Arial, sans-serif" font-size="15" fill="#657086">class name</text>
  <text x="82" y="198" font-family="Arial, sans-serif" font-size="15" fill="#657086">image file</text>
  <text x="82" y="228" font-family="Arial, sans-serif" font-size="15" fill="#657086">object count</text>
  <text x="82" y="258" font-family="Arial, sans-serif" font-size="15" fill="#657086">movement words</text>
  <rect x="382" y="94" width="230" height="216" rx="8" fill="#f5fbf8" stroke="#b7ddd2" stroke-width="3"/>
  <text x="406" y="132" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">Write this</text>
  <text x="406" y="168" font-family="Arial, sans-serif" font-size="15" fill="#172033">Create class Advert</text>
  <text x="406" y="198" font-family="Arial, sans-serif" font-size="15" fill="#172033">Set image cell.jpg</text>
  <text x="406" y="228" font-family="Arial, sans-serif" font-size="15" fill="#172033">Add two Suns</text>
  <text x="406" y="258" font-family="Arial, sans-serif" font-size="15" fill="#172033">move + random turn</text>
  <rect x="682" y="94" width="220" height="216" rx="8" fill="#fff9e8" stroke="#ead89d" stroke-width="3"/>
  <text x="706" y="132" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">Mark point</text>
  <text x="706" y="168" font-family="Arial, sans-serif" font-size="15" fill="#172033">world mark</text>
  <text x="706" y="198" font-family="Arial, sans-serif" font-size="15" fill="#172033">image mark</text>
  <text x="706" y="228" font-family="Arial, sans-serif" font-size="15" fill="#172033">population mark</text>
  <text x="706" y="258" font-family="Arial, sans-serif" font-size="15" fill="#172033">movement mark</text>
  <path d="M318 202h44" stroke="#657086" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M614 202h48" stroke="#657086" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#657086"/>
    </marker>
  </defs>
</svg>
