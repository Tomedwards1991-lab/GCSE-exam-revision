<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" role="img" aria-labelledby="title desc">
  <title id="title">Greenfoot story language map</title>
  <desc id="desc">A diagram mapping story words in Greenfoot questions to code actions.</desc>
  <rect width="960" height="380" fill="#f7f9fb"/>
  <text x="54" y="58" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#172033">Story language means code</text>
  <g font-family="Arial, sans-serif">
    <rect x="64" y="96" width="184" height="74" rx="8" fill="#ffffff" stroke="#dce3eb" stroke-width="3"/>
    <text x="92" y="128" font-size="20" font-weight="700" fill="#172033">"collects"</text>
    <text x="92" y="154" font-size="15" fill="#657086">player touches item</text>
    <rect x="64" y="206" width="184" height="74" rx="8" fill="#ffffff" stroke="#dce3eb" stroke-width="3"/>
    <text x="92" y="238" font-size="20" font-weight="700" fill="#172033">"eats/drinks"</text>
    <text x="92" y="264" font-size="15" fill="#657086">remove object</text>
    <rect x="386" y="96" width="184" height="74" rx="8" fill="#ffffff" stroke="#dce3eb" stroke-width="3"/>
    <text x="414" y="128" font-size="20" font-weight="700" fill="#172033">"catches"</text>
    <text x="414" y="154" font-size="15" fill="#657086">remove player</text>
    <rect x="386" y="206" width="184" height="74" rx="8" fill="#ffffff" stroke="#dce3eb" stroke-width="3"/>
    <text x="414" y="238" font-size="20" font-weight="700" fill="#172033">"gains/loses"</text>
    <text x="414" y="264" font-size="15" fill="#657086">update counter</text>
    <rect x="700" y="118" width="208" height="140" rx="8" fill="#172033"/>
    <text x="724" y="154" font-family="Menlo, Consolas, monospace" font-size="16" fill="#dff3ed">if (touching item)</text>
    <text x="744" y="184" font-family="Menlo, Consolas, monospace" font-size="16" fill="#ffffff">removeObject(item);</text>
    <text x="744" y="214" font-family="Menlo, Consolas, monospace" font-size="16" fill="#ffffff">playSound(...);</text>
    <text x="744" y="244" font-family="Menlo, Consolas, monospace" font-size="16" fill="#cfe0ff">counter.add(1);</text>
  </g>
  <path d="M250 134h118" stroke="#657086" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M572 134h110" stroke="#657086" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M250 244h118" stroke="#657086" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M572 244h110" stroke="#657086" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#657086"/>
    </marker>
  </defs>
</svg>
